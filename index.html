<!DOCTYPE html>


<html lang="fr">


    <head>

                        <img src="./assets/images/iconeProjet.svg" alt="">

                    <p>Projet</p>
                </div>
                <!-- bouton contact -->
                <div class="item">
                    <div class="icon" id="boutonContact">
                        <img src="./assets/images/iconeContact.svg" alt="">

                    <p>Contact</p>
                </div>
            </div>
        </section>


        <div id="pageAPropos">

                    </div>
                    
                </div>
                <div class="texteAPropos">

                </div>
            </div>
        </div>

        <div id="pageProjet">
            
            <div id="modeDeTravail">
                <span class="fermerLaPage" id="croixProjet">X</span>
                <div id="logiciel">
                    <h3>Outils Utilisés</h3>
                    <p>github,vsCode,docker,react .....</p>
                </div>
                <div id="languages">
                    <p>javascript,html,css,php</p>
                </div>
            </div>
            <div id="listeProjet">
                <h2>Projet</h2>
            </div>
        </div>


        <div id="pageContact">
            <span class="fermerLaPage" id="croixContact">X</span>
            <p>blah blah blah</p>
